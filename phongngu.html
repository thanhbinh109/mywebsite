<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT - Phòng Ngủ</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
        /* TÙY CHỈNH RIÊNG CHO PHÒNG NGỦ (TÔNG XANH TÍM) */
        
        /* 1. Header màu xanh tím tĩnh lặng */
        .header { 
            background: linear-gradient(135deg, #3f51b5 0%, #5c6bc0 100%) !important; 
        }

        /* 2. Nút menu Phòng Ngủ nổi bật */
        .nav a.active-ngu {
            background-color: #e8eaf6;
            color: #3f51b5;
            border-left: 4px solid #3f51b5;
        }

        /* 3. Khung chứa thiết bị (Dùng CSS Grid) */
        .khung-thiet-bi {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 25px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        /* 4. Thẻ thiết bị */
        .the-thiet-bi {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column; 
            justify-content: space-between;
            align-items: center; 
            border-top: 4px solid #5c6bc0; /* Vạch tím phía trên thẻ */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            min-height: 190px;
        }

        .the-thiet-bi:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(63, 81, 181, 0.15);
        }

        .the-thiet-bi p {
            margin: 0 0 15px 0;
            font-weight: bold;
            color: #4a5568;
            font-size: 15px;
            text-align: center;
            text-transform: capitalize; /* Tự động viết hoa chữ cái đầu */
        }

        /* 5. Thông số cảm biến */
        .status-so {
            color: #3f51b5;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
        }

        /* 6. Nút bấm điều khiển */
        .nut-dieu-khien {
            background-color: #673ab7;
            color: white;
            border: none;
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s ease;
            margin-top: auto;
        }

        .nut-dieu-khien:hover { filter: brightness(1.1); }
        .nut-dieu-khien:active { transform: scale(0.95); }

        /* 7. Ảnh thiết bị */
        .anh-thiet-bi { 
            height: 65px; 
            width: auto; 
            object-fit: contain;
            margin-bottom: 10px;
            transition: transform 0.3s ease;
        }

        /* 8. HIỆU ỨNG XOAY CHO QUẠT */
        @keyframes xoayQuat {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .quat-dang-quay {
            animation: xoayQuat 0.8s linear infinite; /* Tốc độ quay của quạt */
        }

        hr {
            border: 0;
            height: 1px;
            background: #e2e8f0;
            margin: 30px 0 20px 0;
        }
    </style>
</head>
<body>

    <header class="header">
        <h3>Hệ thống IoT - Phòng Ngủ</h3>
    </header>

    <div class="main-container">
        <nav class="sidebar nav">
            <ul>
                <li><a href="./index.html">TRANG CHỦ</a></li>
                <li><a href="./phongkhach.html">PHÒNG KHÁCH</a></li>
                <li><a href="./phongngu.html" class="active-ngu">PHÒNG NGỦ</a></li>
                <li><a href="./phongbep.html">PHÒNG BẾP</a></li>
            </ul>
        </nav>
        
        <main class="content">
            <h1 style="color: #3f51b5;">Chế độ nghỉ ngơi</h1>
            <p style="font-size: 16px;">Trạng thái: <span style="color: #3f51b5; font-weight: bold; background: #e8eaf6; padding: 5px 10px; border-radius: 20px;">Êm dịu</span></p>

            <div class="khung-thiet-bi">
                <div class="the-thiet-bi">
                    <p>Nhiệt độ ngủ</p>
                    <div class="status-so">26°C</div>
                </div>
                <div class="the-thiet-bi">
                    <p>Ánh sáng</p>
                    <div class="status-so">30%</div>
                </div>
            </div>

            <hr>
            <h3 style="color: #4a5568; margin-bottom: 15px;">Thiết bị điện</h3>
            
            <div class="khung-thiet-bi">
                <div class="the-thiet-bi">
                    <p>Quạt trần</p>
                    <img id="anh-quat" src="fanoff.png" alt="Quạt trần" class="anh-thiet-bi">
                    <button id="nut-quat" class="nut-dieu-khien" onclick="doiTrangThaiThietBi('quat')">Bật</button>
                </div>

                <div class="the-thiet-bi">
                    <p>Cửa phòng</p>
                    <img id="anh-cua" src="dooroff.png" alt="Cửa phòng" class="anh-thiet-bi">
                    <button id="nut-cua" class="nut-dieu-khien" onclick="doiTrangThaiThietBi('cua')" style="background-color: #ff9800;">Mở Cửa</button>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <p>Hệ thống IoT - Phát triển bởi Sinh viên HCMUTE</p>
    </footer>

    <script>
        function doiTrangThaiThietBi(type) {
            var anh = document.getElementById('anh-' + type);
            var nut = document.getElementById('nut-' + type);

            if (type === 'quat') {
                if (anh.src.match("fanoff")) {
                    anh.src = "fanon.png"; // Vẫn đổi ảnh nếu bạn có ảnh fanon
                    anh.classList.add('quat-dang-quay'); // Thêm hiệu ứng xoay CSS
                    nut.innerText = "Tắt";
                    nut.style.backgroundColor = "#f44336"; // Nút đỏ
                } else {
                    anh.src = "fanoff.png";
                    anh.classList.remove('quat-dang-quay'); // Dừng xoay
                    nut.innerText = "Bật";
                    nut.style.backgroundColor = "#673ab7"; // Nút tím
                }
            }
            else if (type === 'cua') {
                if (anh.src.match("dooroff")) {
                    anh.src = "dooron.png"; 
                    nut.innerText = "Đóng Cửa";
                    nut.style.backgroundColor = "#607d8b"; // Màu xám chì
                } else {
                    anh.src = "dooroff.png"; 
                    nut.innerText = "Mở Cửa";
                    nut.style.backgroundColor = "#ff9800"; // Màu cam
                }
            }
        }
    </script>
</body>
</html>
