<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều khiển Phòng Khách - IoT</title>
    <link rel="stylesheet" type="text/css" href="style.css"> 
</head>
<body>
    <button onclick="doiGiaoDien()" style="position: fixed; top: 15px; right: 20px; z-index: 1000; padding: 10px 15px; border-radius: 50px; border: none; background: #3b82f6; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">🌓 Sáng / Tối</button>

    <header class="header">
        <h3>Hệ thống IoT - Phòng Khách</h3>
    </header>

    <div class="section">
        <nav class="sidebar nav">
            <ul>
                <li><a href="./index.html">TRANG CHỦ</a></li>
                <li><a href="./phongkhach.html" style="background: rgba(49, 130, 206, 0.2); color: #3182ce; border-left: 4px solid #3182ce;">PHÒNG KHÁCH</a></li>
                <li><a href="./phongngu.html">PHÒNG NGỦ</a></li>
                <li><a href="./phongbep.html">PHÒNG BẾP</a></li>
            </ul>
        </nav>
        
        <main class="content">
            <h1 style="color: #1976d2;">Bảng điều khiển Phòng Khách</h1>
            <p>Trạng thái: <span style="color: #4CAF50; font-weight: bold;">Trực tuyến</span></p>

            <div class="khung-thiet-bi" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 25px; margin-top: 20px;">
                <div class="the-thiet-bi" style="border-top: 4px solid #2196f3; padding: 20px; border-radius: 15px; text-align: center;">
                    <p style="font-weight: bold; margin-bottom: 10px;">Nhiệt độ</p>
                    <div style="color: #ff5722; font-size: 32px; font-weight: bold;">28°C</div>
                </div>

                <div class="the-thiet-bi" style="border-top: 4px solid #2196f3; padding: 20px; border-radius: 15px; text-align: center;">
                    <p style="font-weight: bold; margin-bottom: 10px;">Độ ẩm</p>
                    <div style="color: #2196f3; font-size: 32px; font-weight: bold;">65%</div>
                </div>
            </div>

            <hr style="border: 0; height: 1px; background: rgba(128,128,128,0.2); margin: 30px 0;"> 
            <h3 style="margin-bottom: 15px;">Thiết bị điện</h3>
            
            <div class="khung-thiet-bi" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 25px;">
                <div class="the-thiet-bi" style="border-top: 4px solid #2196f3; padding: 20px; border-radius: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; align-items: center; min-height: 190px;">
                    <p style="font-weight: bold;">Đèn trần</p>
                    <img id="anh-den" src="ledoff.png" alt="Đèn trần" style="height: 65px; margin: 10px 0;">
                    <button id="nut-den" class="nut-dieu-khien" onclick="doiTrangThaiThietBi('den')" style="background-color: #4CAF50; color: white; border: none; padding: 10px 0; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;">Bật Đèn</button>
                </div>

                <div class="the-thiet-bi" style="border-top: 4px solid #2196f3; padding: 20px; border-radius: 15px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; align-items: center; min-height: 190px;">
                    <p style="font-weight: bold;">Tivi Samsung</p>
                    <img id="anh-tivi" src="tivioff.png" alt="Tivi" style="height: 65px; margin: 10px 0;">
                    <button id="nut-tivi" class="nut-dieu-khien" onclick="doiTrangThaiThietBi('tivi')" style="background-color: #4CAF50; color: white; border: none; padding: 10px 0; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;">Bật Tivi</button>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <p>Hệ thống IoT - Phát triển bởi Sinh viên HCMUTE</p>
    </footer>

    <div id="toast-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('.nav a');
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault(); document.body.classList.add('page-exit');
                    setTimeout(() => { window.location.href = this.href; }, 300);
                });
            });

            // Khôi phục trạng thái
            if(localStorage.getItem('tb_den_khach') === 'on') {
                document.getElementById('anh-den').src = "ledon.png";
                document.getElementById('nut-den').innerText = "Tắt Đèn";
                document.getElementById('nut-den').style.backgroundColor = "#f44336";
            }
            if(localStorage.getItem('tb_tivi_khach') === 'on') {
                document.getElementById('anh-tivi').src = "tivion.png";
                document.getElementById('nut-tivi').innerText = "Tắt Tivi";
                document.getElementById('nut-tivi').style.backgroundColor = "#f44336";
            }
        });

        function ghiNhatKy(hanhDong) {
            const now = new Date(); const gioPhut = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
            let nhatKy = JSON.parse(localStorage.getItem('nhatKyHoatDong')) || [];
            nhatKy.unshift({ thoiGian: gioPhut, hanhDong: hanhDong });
            if (nhatKy.length > 5) nhatKy.pop(); 
            localStorage.setItem('nhatKyHoatDong', JSON.stringify(nhatKy));
        }

        function doiGiaoDien() {
            document.body.classList.toggle('dark-mode'); const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            if(isDark) thongBao('Đã bật Giao diện Tối 🌙'); else thongBao('Đã bật Giao diện Sáng ☀️');
        }
        if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

        function thongBao(noiDung) {
            const container = document.getElementById('toast-container'); const toast = document.createElement('div');
            toast.className = 'toast'; toast.innerHTML = '🔔 ' + noiDung; container.appendChild(toast);
            setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 400); }, 3000);
        }

        function doiTrangThaiThietBi(loaiThietBi) {
            var anh = document.getElementById('anh-' + loaiThietBi);
            var nut = document.getElementById('nut-' + loaiThietBi);

            if (loaiThietBi === 'den') {
                if (anh.src.match("ledoff")) { 
                    anh.src = "ledon.png"; nut.innerText = "Tắt Đèn"; nut.style.backgroundColor = "#f44336"; 
                    localStorage.setItem('tb_den_khach', 'on'); thongBao("Đã BẬT Đèn trần Phòng Khách"); ghiNhatKy("Bật đèn trần - Phòng khách");
                } else {
                    anh.src = "ledoff.png"; nut.innerText = "Bật Đèn"; nut.style.backgroundColor = "#4CAF50"; 
                    localStorage.setItem('tb_den_khach', 'off'); thongBao("Đã TẮT Đèn trần Phòng Khách"); ghiNhatKy("Tắt đèn trần - Phòng khách");
                }
            }
            else if (loaiThietBi === 'tivi') {
                if (anh.src.match("tivioff")) {
                    anh.src = "tivion.png"; nut.innerText = "Tắt Tivi"; nut.style.backgroundColor = "#f44336"; 
                    localStorage.setItem('tb_tivi_khach', 'on'); thongBao("Hệ thống giải trí: Tivi đã BẬT"); ghiNhatKy("Bật Tivi - Phòng khách");
                } else {
                    anh.src = "tivioff.png"; nut.innerText = "Bật Tivi"; nut.style.backgroundColor = "#4CAF50"; 
                    localStorage.setItem('tb_tivi_khach', 'off'); thongBao("Hệ thống giải trí: Tivi đã TẮT"); ghiNhatKy("Tắt Tivi - Phòng khách");
                }
            }
        }
    </script>
</body>
</html>
